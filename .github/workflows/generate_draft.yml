name: Generate daily IG draft

on:
  schedule:
    # 09:00 UTC every day - edit to whatever time suits you
    - cron: "0 9 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system fonts
        run: sudo apt-get update && sudo apt-get install -y fonts-dejavu-core

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate post and send approval email
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          APPROVAL_SECRET: ${{ secrets.APPROVAL_SECRET }}
          WORKER_BASE_URL: ${{ secrets.WORKER_BASE_URL }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python scripts/generate_post.py
